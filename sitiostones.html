<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<title>Sítio Stones</title>
</head>

<body>
<style>
  @media(max-width: 600px) {
  
  .busca input {
    width: 100%;
  }
  .menu {
    display: none;
    
  
  }
}
</style>
<section class="detalhe2">

  <div class="hero">
    <img src="img/sitiostonesex.jpg" id="imgprincipal">
    <div class="overlay">
      <h1>Sítio Stones<p>⭐ 4.8 • Próximo à Cachoeira</h1>
    </div>
  </div>

  <div class="miniaturas">
    <img src="pousadas/sitiostones/img1.jpg" class="img-card" onclick="abrirModal(this)">
    <img src="pousadas/sitiostones/img2.jpg" class="img-card" onclick="abrirModal(this)">
    <img src="pousadas/sitiostones/img3.jpg" class="img-card" onclick="abrirModal(this)">
    <img src="pousadas/sitiostones/img4.jpg" class="img-card" onclick="abrirModal(this)">
    <img src="pousadas/sitiostones/img5.jpg" class="img-card" onclick="abrirModal(this)">
  </div>
<div id="modal" class="modal">
  <span class="fechar" onclick="fecharModal()">&times;</span>
  <img id="imgModal" class="modal-conteudo">
</div>
</section>
 

<div class="box-info">
    <h2>Sobre</h2>
    <p>Pousada com piscina e natureza</p>
  </div>



<section class="reserva">
  <h2>Reserve sua estadia</h2>

  <form id="formReserva">
    <div class="grupo">
      <label>Nome completo</label>
      <input type="text" placeholder="Seu nome" required>
    </div>

    <div class="grupo">
      <label>Telefone</label>
      <input type="tel" placeholder="(00) 00000-0000" required>
    </div>

    <div class="linha">
      <div class="grupo">
        <label>Check-in</label>
        <input type="date" required>
      </div>

      <div class="grupo">
        <label>Check-out</label>
        <input type="date" required>
      </div>
    </div>

    <div class="linha">
      <div class="grupo">
        <label>Adultos</label>
        <input type="number" min="1" value="1">
      </div>

      <div class="grupo">
        <label>Crianças</label>
        <input type="number" min="0" value="0">
      </div>
    </div>

    <div class="grupo">
      <label>Observações</label>
      <textarea placeholder="Ex: quarto com vista, cama extra..."></textarea>
    </div>

    <button type="submit" class="bnt-reservawhats">Reservar via WhatsApp</button>
  </form>
  
</section>
<div class="btn-voltar"><a href="index.html" >VOLTAR</a></div>

<script>
  
// ABRIR MODAL
function abrirModal(img) {
  const modal = document.getElementById("modal");
  const imgModal = document.getElementById("imgModal");

  modal.style.display = "flex"; 
  imgModal.src = img.src;
}

// FECHAR MODAL
function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

// FECHAR AO CLICAR FORA DA IMAGEM
const modal = document.getElementById("modal");

modal.addEventListener("click", function(e) {
  if (e.target === modal) {
    fecharModal();
  }
});
document.getElementById("formReserva").addEventListener("submit", function(e) {
  e.preventDefault();

  const nome = document.querySelector("input[type=text]").value;
  const telefone = document.querySelector("input[type=tel]").value;
  const datas = document.querySelectorAll("input[type=date]");
  const checkin = datas[0].value;
  const checkout = datas[1].value;
  const numeros = document.querySelectorAll("input[type=number]");
  const adultos = numeros[0].value;
  const criancas = numeros[1].value;
  const obs = document.querySelector("textarea").value;

  const mensagem = `Reserva de Pousada:
  
Nome: ${nome}
Telefone: ${telefone}
Check-in: ${checkin}
Check-out: ${checkout}
Adultos: ${adultos}
Crianças: ${criancas}
Observações: ${obs}`;

  const numero = "5538991090350";

  const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

  window.open(url, "_blank");
});
</script>

</body>
</html>
